<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ website }} - Accounts</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 28px;
        }

        header a {
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
        }
        header a:hover { color: #4f46e5; }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin-top: 8px;
            text-transform: capitalize;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #f8f9fb;
            padding: 12px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .05em;
            border-bottom: 1px solid #e5e7eb;
        }

        tbody tr {
            border-bottom: 1px solid #f0f2f5;
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #fafbff; }

        td {
            padding: 14px 20px;
            font-size: 14px;
            color: #374151;
        }

        .password-cell {
            font-family: "Courier New", monospace;
            letter-spacing: .04em;
            max-width: 160px;
        }

        .password-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
        }

        .password-text {
            font-family: "Courier New", monospace;
            letter-spacing: .04em;
            word-break: break-all;
            min-width: 0;
            flex: 1 1 0;
        }

        .btn-icon {
            padding: 4px 7px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            line-height: 1;
        }
        .btn-icon:hover { background: #e5e7eb; color: #374151; }

        .btn-copied {
            background: #dcfce7 !important;
            color: #16a34a !important;
        }

        .actions-cell {
            white-space: nowrap;
            text-align: right;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-edit {
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-delete {
            background: #fef2f2;
            color: #dc2626;
        }

        .url-cell {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .url-cell a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 13px;
        }
        .url-cell a:hover { text-decoration: underline; }

        .empty-state {
            padding: 48px 20px;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            padding: 28px 32px;
            width: 100%;
            max-width: 400px;
        }

        .modal h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-save {
            flex: 1;
            justify-content: center;
            padding: 9px;
            background: #4f46e5;
            color: #fff;
            border-radius: 8px;
        }
        .btn-cancel {
            flex: 1;
            justify-content: center;
            padding: 9px;
            background: #f3f4f6;
            color: #374151;
            border-radius: 8px;
        }

        .btn-generate-modal {
            margin-top: 5px;
            padding: 0;
            background: none;
            border: none;
            font-size: 11px;
            color: #6366f1;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.15s;
            text-align: left;
        }
        .btn-generate-modal:hover { color: #4f46e5; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="/">&larr; All websites</a>
        <h1>{{website}}</h1>
    </header>
    <div class="card">
        {% if accounts %}
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Website link</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for account in accounts %}
                <tr>
                    <td>{{account.username}}</td>
                    <td class="password-cell">
                        <div class="password-wrap">
                            <span class="password-text" data-password="{{ account.password }}">••••••••</span>
                            <button class="btn-icon toggle-btn" title="Show/hide">👁</button>
                            <button class="btn-icon copy-btn" title="Copy">⎘</button>
                        </div>
                    </td>
                    <td class="url-cell"><a href="{{account.url}}" target="_blank">{{account.url}}</a></td>
                    <td class="actions-cell">
                        <button class="btn btn-edit edit-btn"
                            data-id="{{account.id}}"
                            data-website="{{account.website}}"
                            data-username="{{account.username}}"
                            data-password="{{account.password}}"
                            data-url="{{account.url}}">Edit</button>
                        <form action="/delete/{{account.id}}" method="POST" style="display:inline"
                            onsubmit="return confirm('Are you sure you want to delete this account?');">
                            <button class="btn btn-delete" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty-state"> No accounts found for {{website}}</div>
        {% endif %}
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>Edit Account</h2>
        <form id="editForm" method="POST">
            <div class="field">
                <label>Website</label>
                <input type="text" name="website" id="editWebsite" required>
            </div>
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" id="editUsername" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="text" name="password" id="editPassword" required>
                <button type="button" id="editGenerateBtn" class="btn-generat-modal">Generate strong password</button>
            </div>
            <div class="field">
                <label>Website URL</label>
                <input type="text" name="url" id="editUrl">
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn btn-save">Save changes</button>
                <button type="button" class="btn btn-cancel" onclick="closeEdit()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.querySelectorAll(".edit-btn").forEach(function(btn){
        btn.addEventListener("click", function(){
            document.getElementById("editForm").action="/edit/"+btn.dataset.id;
            document.getElementById("editWebsite").value=btn.dataset.website;
            document.getElementById("editUsername").value=btn.dataset.username;
            document.getElementById("editPassword").value=btn.dataset.password;
            document.getElementById("editUrl").value=btn.dataset.url;
            document.getElementById("editModal").classList.add("open");
        })
    });

    document.getElementById("editForm").addEventListener("submit", function(e) {
        e.preventDefault();
        var form = e.target;
        fetch(form.action, { method: "POST", body: new FormData(form) })
            .then(function(res) { return res.json().then(function(body) { return { ok: res.ok, body: body }; }); })
            .then(function(result) {
                if (result.ok) {
                    window.location.href = result.body.redirect;
                } else {
                    alert(result.body.error);
                }
            });
    });


    document.getElementById("editGenerateBtn").addEventListener("click", function(){
        const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
        let password="";
        for (let i=0; i<16; i++){
            password+=chars.charAt(Math.floor(Math.random()*chars.length));
        }
        const input=document.getElementById("editPassword");
        input.value=password;
        input.type="text";
        setTimeout(() => {
            input.type="password";
        }, 2000);
    });

    function closeEdit(){
        document.getElementById("editModal").classList.remove("open");
    }

    document.querySelectorAll(".toggle-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
            var span = btn.previousElementSibling;
            var pw = span.dataset.password;
            if (span.textContent === "••••••••") {
                span.textContent = pw;
                btn.title = "Hide";
            } else {
                span.textContent = "••••••••";
                btn.title = "Show";
            }
        });
    });

    document.querySelectorAll(".copy-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
            var span = btn.parentElement.querySelector(".password-text");
            navigator.clipboard.writeText(span.dataset.password).then(function() {
                btn.textContent = "✓";
                btn.classList.add("btn-copied");
                setTimeout(function() {
                    btn.textContent = "⎘";
                    btn.classList.remove("btn-copied");
                }, 1500);
            });
        });
    });





</script>
</body>
</html>
